<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>支援事業者登録 - Relief</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white text-slate-700">
    <!-- ナビゲーションバー -->
    <div id="nav"></div>

    <!-- メインコンテンツ -->
    <main class="max-w-3xl mx-auto p-4 py-12">
        <h1 class="text-4xl font-bold text-slate-800 mb-4">支援事業者登録</h1>
        <p class="text-lg text-slate-600 mb-8">
            Reliefの支援事業者パートナーとして活動をご希望の方は、以下のフォームからお申し込みください。
            審査後、登録の可否についてご連絡いたします。
        </p>

        <!-- 登録フォーム -->
        <form class="space-y-8" id="provider-register-form">
            <!-- 事業者情報 -->
            <section class="bg-slate-50 p-6 rounded-lg">
                <h2 class="text-xl font-bold text-slate-800 mb-6">事業者情報</h2>

                <div class="mb-6">
                    <label for="company-name" class="block text-sm font-medium text-slate-700 mb-2">事業者名（法人名） *</label>
                    <input type="text" id="company-name" name="company-name" required
                           class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                </div>

                <div class="mb-6">
                    <label for="company-type" class="block text-sm font-medium text-slate-700 mb-2">事業形態 *</label>
                    <select id="company-type" name="company-type" required
                            class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                        <option value="">選択してください</option>
                        <option value="corporation">株式会社</option>
                        <option value="llc">合同会社</option>
                        <option value="foundation">財団法人</option>
                        <option value="association">社団法人</option>
                        <option value="npo">特定非営利活動法人</option>
                        <option value="individual">個人事業主</option>
                        <option value="other">その他</option>
                    </select>
                </div>

                <div class="mb-6">
                    <label for="representative" class="block text-sm font-medium text-slate-700 mb-2">代表者名 *</label>
                    <input type="text" id="representative" name="representative" required
                           class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                </div>

                <div class="mb-6">
                    <label for="established" class="block text-sm font-medium text-slate-700 mb-2">設立年月</label>
                    <input type="month" id="established" name="established"
                           class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                </div>

                <div class="mb-6">
                    <label for="employees" class="block text-sm font-medium text-slate-700 mb-2">従業員数</label>
                    <select id="employees" name="employees"
                            class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                        <option value="">選択してください</option>
                        <option value="1-5">1-5名</option>
                        <option value="6-10">6-10名</option>
                        <option value="11-20">11-20名</option>
                        <option value="21-50">21-50名</option>
                        <option value="51-100">51-100名</option>
                        <option value="100+">100名以上</option>
                    </select>
                </div>
            </section>

            <!-- 連絡先情報 -->
            <section class="bg-slate-50 p-6 rounded-lg">
                <h2 class="text-xl font-bold text-slate-800 mb-6">連絡先情報</h2>

                <div class="mb-6">
                    <label for="address" class="block text-sm font-medium text-slate-700 mb-2">所在地 *</label>
                    <input type="text" id="address" name="address" required
                           placeholder="郵便番号、住所"
                           class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                </div>

                <div class="mb-6">
                    <label for="phone" class="block text-sm font-medium text-slate-700 mb-2">電話番号 *</label>
                    <input type="tel" id="phone" name="phone" required
                           class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                </div>

                <div class="mb-6">
                    <label for="email" class="block text-sm font-medium text-slate-700 mb-2">メールアドレス *</label>
                    <input type="email" id="email" name="email" required
                           class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                </div>

                <div class="mb-6">
                    <label for="website" class="block text-sm font-medium text-slate-700 mb-2">ウェブサイト</label>
                    <input type="url" id="website" name="website"
                           placeholder="https://example.com"
                           class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                </div>
            </section>

            <!-- 事業内容 -->
            <section class="bg-slate-50 p-6 rounded-lg">
                <h2 class="text-xl font-bold text-slate-800 mb-6">事業内容</h2>

                <div class="mb-6">
                    <label for="business-description" class="block text-sm font-medium text-slate-700 mb-2">事業内容の概要 *</label>
                    <textarea id="business-description" name="business-description" rows="4" required
                              placeholder="事業内容について簡潔にご説明ください"
                              class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"></textarea>
                </div>

                <div class="mb-6">
                    <label class="block text-sm font-medium text-slate-700 mb-4">支援分野（複数選択可） *</label>
                    <div class="grid grid-cols-2 md:grid-cols-3 gap-3">
                        <label class="flex items-center">
                            <input type="checkbox" name="support-fields" value="counseling" class="rounded border-slate-300 text-blue-600 focus:ring-blue-500">
                            <span class="ml-2 text-sm text-slate-700">カウンセリング</span>
                        </label>
                        <label class="flex items-center">
                            <input type="checkbox" name="support-fields" value="training" class="rounded border-slate-300 text-blue-600 focus:ring-blue-500">
                            <span class="ml-2 text-sm text-slate-700">研修・トレーニング</span>
                        </label>
                        <label class="flex items-center">
                            <input type="checkbox" name="support-fields" value="assessment" class="rounded border-slate-300 text-blue-600 focus:ring-blue-500">
                            <span class="ml-2 text-sm text-slate-700">アセスメント</span>
                        </label>
                        <label class="flex items-center">
                            <input type="checkbox" name="support-fields" value="consulting" class="rounded border-slate-300 text-blue-600 focus:ring-blue-500">
                            <span class="ml-2 text-sm text-slate-700">コンサルティング</span>
                        </label>
                        <label class="flex items-center">
                            <input type="checkbox" name="support-fields" value="therapy" class="rounded border-slate-300 text-blue-600 focus:ring-blue-500">
                            <span class="ml-2 text-sm text-slate-700">療法・治療</span>
                        </label>
                        <label class="flex items-center">
                            <input type="checkbox" name="support-fields" value="prevention" class="rounded border-slate-300 text-blue-600 focus:ring-blue-500">
                            <span class="ml-2 text-sm text-slate-700">予防プログラム</span>
                        </label>
                        <label class="flex items-center">
                            <input type="checkbox" name="support-fields" value="education" class="rounded border-slate-300 text-blue-600 focus:ring-blue-500">
                            <span class="ml-2 text-sm text-slate-700">教育・啓発</span>
                        </label>
                        <label class="flex items-center">
                            <input type="checkbox" name="support-fields" value="other" class="rounded border-slate-300 text-blue-600 focus:ring-blue-500">
                            <span class="ml-2 text-sm text-slate-700">その他</span>
                        </label>
                    </div>
                </div>

                <div class="mb-6">
                    <label for="target-audience" class="block text-sm font-medium text-slate-700 mb-2">対象者</label>
                    <div class="space-y-2">
                        <label class="flex items-center">
                            <input type="checkbox" name="target-audience" value="individuals" class="rounded border-slate-300 text-blue-600 focus:ring-blue-500">
                            <span class="ml-2 text-sm text-slate-700">個人</span>
                        </label>
                        <label class="flex items-center">
                            <input type="checkbox" name="target-audience" value="families" class="rounded border-slate-300 text-blue-600 focus:ring-blue-500">
                            <span class="ml-2 text-sm text-slate-700">家族</span>
                        </label>
                        <label class="flex items-center">
                            <input type="checkbox" name="target-audience" value="companies" class="rounded border-slate-300 text-blue-600 focus:ring-blue-500">
                            <span class="ml-2 text-sm text-slate-700">企業・団体</span>
                        </label>
                        <label class="flex items-center">
                            <input type="checkbox" name="target-audience" value="schools" class="rounded border-slate-300 text-blue-600 focus:ring-blue-500">
                            <span class="ml-2 text-sm text-slate-700">学校・教育機関</span>
                        </label>
                        <label class="flex items-center">
                            <input type="checkbox" name="target-audience" value="communities" class="rounded border-slate-300 text-blue-600 focus:ring-blue-500">
                            <span class="ml-2 text-sm text-slate-700">地域コミュニティ</span>
                        </label>
                    </div>
                </div>

                <div class="mb-6">
                    <label for="qualifications" class="block text-sm font-medium text-slate-700 mb-2">保有資格・認定</label>
                    <textarea id="qualifications" name="qualifications" rows="3"
                              placeholder="事業者が保有する資格や認定についてご記入ください"
                              class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"></textarea>
                </div>
            </section>

            <!-- 連携希望 -->
            <section class="bg-slate-50 p-6 rounded-lg">
                <h2 class="text-xl font-bold text-slate-800 mb-6">連携希望</h2>

                <div class="mb-6">
                    <label for="collaboration-type" class="block text-sm font-medium text-slate-700 mb-2">希望する連携形態 *</label>
                    <div class="space-y-2">
                        <label class="flex items-center">
                            <input type="radio" name="collaboration-type" value="referral" required class="border-slate-300 text-blue-600 focus:ring-blue-500">
                            <span class="ml-2 text-sm text-slate-700">クライアント紹介（リファラル）</span>
                        </label>
                        <label class="flex items-center">
                            <input type="radio" name="collaboration-type" value="joint-service" class="border-slate-300 text-blue-600 focus:ring-blue-500">
                            <span class="ml-2 text-sm text-slate-700">共同サービス提供</span>
                        </label>
                        <label class="flex items-center">
                            <input type="radio" name="collaboration-type" value="training" class="border-slate-300 text-blue-600 focus:ring-blue-500">
                            <span class="ml-2 text-sm text-slate-700">伴走者研修の提供</span>
                        </label>
                        <label class="flex items-center">
                            <input type="radio" name="collaboration-type" value="other" class="border-slate-300 text-blue-600 focus:ring-blue-500">
                            <span class="ml-2 text-sm text-slate-700">その他</span>
                        </label>
                    </div>
                </div>

                <div class="mb-6">
                    <label for="collaboration-details" class="block text-sm font-medium text-slate-700 mb-2">連携内容の詳細</label>
                    <textarea id="collaboration-details" name="collaboration-details" rows="4"
                              placeholder="どのような連携を希望するか、具体的にご説明ください"
                              class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"></textarea>
                </div>

                <div class="mb-6">
                    <label for="motivation" class="block text-sm font-medium text-slate-700 mb-2">連携を希望する理由 *</label>
                    <textarea id="motivation" name="motivation" rows="3" required
                              placeholder="なぜReliefと連携したいのかをご記入ください"
                              class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"></textarea>
                </div>
            </section>

            <!-- 同意事項 -->
            <section class="bg-slate-50 p-6 rounded-lg">
                <h2 class="text-xl font-bold text-slate-800 mb-6">同意事項</h2>

                <div class="space-y-4">
                    <div>
                        <label class="flex items-start">
                            <input type="checkbox" id="terms-agreement" name="terms-agreement" required class="mt-1 rounded border-slate-300 text-blue-600 focus:ring-blue-500">
                            <span class="ml-2 text-sm text-slate-700">
                                <a href="terms-provider.html" class="text-blue-600 hover:text-blue-800 underline">支援事業者利用規約</a>に同意します *
                            </span>
                        </label>
                    </div>

                    <div>
                        <label class="flex items-start">
                            <input type="checkbox" id="privacy-agreement" name="privacy-agreement" required class="mt-1 rounded border-slate-300 text-blue-600 focus:ring-blue-500">
                            <span class="ml-2 text-sm text-slate-700">
                                <a href="privacy.html" class="text-blue-600 hover:text-blue-800 underline">プライバシーポリシー</a>に同意します *
                            </span>
                        </label>
                    </div>

                    <div>
                        <label class="flex items-start">
                            <input type="checkbox" id="accuracy-confirmation" name="accuracy-confirmation" required class="mt-1 rounded border-slate-300 text-blue-600 focus:ring-blue-500">
                            <span class="ml-2 text-sm text-slate-700">
                                記載された情報は正確であり、虚偽の記載がないことを確認します *
                            </span>
                        </label>
                    </div>
                </div>
            </section>

            <!-- 送信ボタン -->
            <div class="text-center">
                <button type="submit" class="px-8 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors font-medium">
                    登録申請を送信する
                </button>
                <p class="text-sm text-slate-600 mt-4">
                    送信後、審査の結果について1週間以内にメールにてご連絡いたします。
                </p>
            </div>
        </form>
    </main>

    <div id="footer"></div>
    <script src="assets/script.js" defer></script>
    <script>
        // フォームバリデーション
        document.getElementById('provider-register-form').addEventListener('submit', function(e) {
            e.preventDefault();

            // 支援分野のチェック
            const supportFields = document.querySelectorAll('input[name="support-fields"]:checked');
            if (supportFields.length === 0) {
                alert('支援分野を1つ以上選択してください。');
                return;
            }

            // 対象者のチェック
            const targetAudiences = document.querySelectorAll('input[name="target-audience"]:checked');
            if (targetAudiences.length === 0) {
                alert('対象者を1つ以上選択してください。');
                return;
            }

            // 連携形態のチェック
            const collaborationType = document.querySelector('input[name="collaboration-type"]:checked');
            if (!collaborationType) {
                alert('希望する連携形態を選択してください。');
                return;
            }

            // 送信処理（実際の送信はここで行う）
            alert('登録申請を送信しました。審査結果をお待ちください。');
            // this.submit(); // 実際の送信時はコメントアウトを外す
        });
    </script>
</body>
</html>
