<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>会員登録 - Relief</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white text-slate-700">
    <!-- ナビゲーションバー -->
    <div id="nav"></div>

    <!-- メインコンテンツ -->
    <main class="max-w-3xl mx-auto p-4 py-12">
        <h1 class="text-4xl font-bold text-slate-800 mb-4">会員登録</h1>
        <p class="text-lg text-slate-600 mb-12">
            Relief のサービスをご利用いただくための会員登録です。登録後、伴走者のマッチングを開始します。
        </p>

        <!-- 登録フォーム -->
        <div class="bg-white border border-slate-200 rounded-lg overflow-hidden shadow-sm">
            <iframe src="https://forms.office.com/r/GiLQRUzE4H" width="100%" frameborder="0" marginheight="0" marginwidth="0" style="height:800px;"></iframe>
        </div>
            </form>
        </div>

        <!-- 注意事項 -->
        <div class="mt-8 bg-slate-50 border border-slate-200 rounded-lg p-6">
            <h3 class="text-lg font-bold text-slate-800 mb-4">ご注意ください</h3>
            <ul class="space-y-2 text-slate-600 text-sm">
                <li class="flex gap-2">
                    <span class="flex-shrink-0">•</span>
                    <span>登録後、1-3営業日以内に担当者より連絡いたします</span>
                </li>
                <li class="flex gap-2">
                    <span class="flex-shrink-0">•</span>
                    <span>初回面談は無料です。以降の支援については料金が発生します</span>
                </li>
                <li class="flex gap-2">
                    <span class="flex-shrink-0">•</span>
                    <span>入力いただいた情報は支援目的以外には使用しません</span>
                </li>
                <li class="flex gap-2">
                    <span class="flex-shrink-0">•</span>
                    <span>登録内容の変更やキャンセルはいつでも可能です</span>
                </li>
            </ul>
        </div>
    </main>

    <div id="footer"></div>
    <script src="assets/script.js" defer></script>
</body>
</html>
