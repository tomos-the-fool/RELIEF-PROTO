<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>伴走者登録 - Relief</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white text-slate-700">
    <!-- ナビゲーションバー -->
    <div id="nav"></div>

    <!-- メインコンテンツ -->
    <main class="max-w-3xl mx-auto p-4 py-12">
        <h1 class="text-4xl font-bold text-slate-800 mb-4">伴走者登録</h1>
        <p class="text-lg text-slate-600 mb-8">
            Reliefの伴走者として活動をご希望の方は、以下のフォームからお申し込みください。
            審査後、登録の可否についてご連絡いたします。
        </p>

        <!-- 登録フォーム -->
        <form class="space-y-8" id="mentor-register-form">
            <!-- 基本情報 -->
            <section class="bg-slate-50 p-6 rounded-lg">
                <h2 class="text-xl font-bold text-slate-800 mb-6">基本情報</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label for="last-name" class="block text-sm font-medium text-slate-700 mb-2">姓 *</label>
                        <input type="text" id="last-name" name="last-name" required
                               class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                    </div>
                    <div>
                        <label for="first-name" class="block text-sm font-medium text-slate-700 mb-2">名 *</label>
                        <input type="text" id="first-name" name="first-name" required
                               class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                    </div>
                </div>

                <div class="mt-6">
                    <label for="email" class="block text-sm font-medium text-slate-700 mb-2">メールアドレス *</label>
                    <input type="email" id="email" name="email" required
                           class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                </div>

                <div class="mt-6">
                    <label for="phone" class="block text-sm font-medium text-slate-700 mb-2">電話番号 *</label>
                    <input type="tel" id="phone" name="phone" required
                           class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                </div>

                <div class="mt-6">
                    <label for="birthdate" class="block text-sm font-medium text-slate-700 mb-2">生年月日 *</label>
                    <input type="date" id="birthdate" name="birthdate" required
                           class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                </div>

                <div class="mt-6">
                    <label for="gender" class="block text-sm font-medium text-slate-700 mb-2">性別 *</label>
                    <select id="gender" name="gender" required
                            class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                        <option value="">選択してください</option>
                        <option value="male">男性</option>
                        <option value="female">女性</option>
                        <option value="other">その他</option>
                        <option value="prefer-not-to-say">回答しない</option>
                    </select>
                </div>
            </section>

            <!-- 専門情報 -->
            <section class="bg-slate-50 p-6 rounded-lg">
                <h2 class="text-xl font-bold text-slate-800 mb-6">専門情報</h2>

                <div class="mb-6">
                    <label for="occupation" class="block text-sm font-medium text-slate-700 mb-2">現在の職業 *</label>
                    <input type="text" id="occupation" name="occupation" required
                           placeholder="例: 臨床心理士、カウンセラー、キャリアコンサルタント"
                           class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                </div>

                <div class="mb-6">
                    <label for="experience" class="block text-sm font-medium text-slate-700 mb-2">支援経験年数 *</label>
                    <select id="experience" name="experience" required
                            class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                        <option value="">選択してください</option>
                        <option value="0-1">1年未満</option>
                        <option value="1-3">1-3年</option>
                        <option value="3-5">3-5年</option>
                        <option value="5-10">5-10年</option>
                        <option value="10+">10年以上</option>
                    </select>
                </div>

                <div class="mb-6">
                    <label class="block text-sm font-medium text-slate-700 mb-4">得意分野（複数選択可） *</label>
                    <div class="grid grid-cols-2 md:grid-cols-3 gap-3">
                        <label class="flex items-center">
                            <input type="checkbox" name="specialties" value="depression" class="rounded border-slate-300 text-blue-600 focus:ring-blue-500">
                            <span class="ml-2 text-sm text-slate-700">うつ病・気分障害</span>
                        </label>
                        <label class="flex items-center">
                            <input type="checkbox" name="specialties" value="anxiety" class="rounded border-slate-300 text-blue-600 focus:ring-blue-500">
                            <span class="ml-2 text-sm text-slate-700">不安障害</span>
                        </label>
                        <label class="flex items-center">
                            <input type="checkbox" name="specialties" value="career" class="rounded border-slate-300 text-blue-600 focus:ring-blue-500">
                            <span class="ml-2 text-sm text-slate-700">キャリア</span>
                        </label>
                        <label class="flex items-center">
                            <input type="checkbox" name="specialties" value="relationships" class="rounded border-slate-300 text-blue-600 focus:ring-blue-500">
                            <span class="ml-2 text-sm text-slate-700">人間関係</span>
                        </label>
                        <label class="flex items-center">
                            <input type="checkbox" name="specialties" value="stress" class="rounded border-slate-300 text-blue-600 focus:ring-blue-500">
                            <span class="ml-2 text-sm text-slate-700">ストレス管理</span>
                        </label>
                        <label class="flex items-center">
                            <input type="checkbox" name="specialties" value="life-transition" class="rounded border-slate-300 text-blue-600 focus:ring-blue-500">
                            <span class="ml-2 text-sm text-slate-700">ライフイベント</span>
                        </label>
                        <label class="flex items-center">
                            <input type="checkbox" name="specialties" value="youth" class="rounded border-slate-300 text-blue-600 focus:ring-blue-500">
                            <span class="ml-2 text-sm text-slate-700">若年層支援</span>
                        </label>
                        <label class="flex items-center">
                            <input type="checkbox" name="specialties" value="elderly" class="rounded border-slate-300 text-blue-600 focus:ring-blue-500">
                            <span class="ml-2 text-sm text-slate-700">高齢者支援</span>
                        </label>
                        <label class="flex items-center">
                            <input type="checkbox" name="specialties" value="other" class="rounded border-slate-300 text-blue-600 focus:ring-blue-500">
                            <span class="ml-2 text-sm text-slate-700">その他</span>
                        </label>
                    </div>
                </div>

                <div class="mb-6">
                    <label for="qualifications" class="block text-sm font-medium text-slate-700 mb-2">資格・研修歴</label>
                    <textarea id="qualifications" name="qualifications" rows="4"
                              placeholder="取得している資格や受講した研修についてご記入ください"
                              class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"></textarea>
                </div>

                <div class="mb-6">
                    <label for="approach" class="block text-sm font-medium text-slate-700 mb-2">支援アプローチ</label>
                    <textarea id="approach" name="approach" rows="4"
                              placeholder="どのような支援スタイルをお持ちですか？（認知行動療法、来談者中心療法など）"
                              class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"></textarea>
                </div>
            </section>

            <!-- 活動条件 -->
            <section class="bg-slate-50 p-6 rounded-lg">
                <h2 class="text-xl font-bold text-slate-800 mb-6">活動条件</h2>

                <div class="mb-6">
                    <label for="consultation-method" class="block text-sm font-medium text-slate-700 mb-2">相談方法 *</label>
                    <div class="space-y-2">
                        <label class="flex items-center">
                            <input type="checkbox" name="consultation-method" value="online" class="rounded border-slate-300 text-blue-600 focus:ring-blue-500">
                            <span class="ml-2 text-sm text-slate-700">オンライン相談</span>
                        </label>
                        <label class="flex items-center">
                            <input type="checkbox" name="consultation-method" value="offline" class="rounded border-slate-300 text-blue-600 focus:ring-blue-500">
                            <span class="ml-2 text-sm text-slate-700">対面相談</span>
                        </label>
                    </div>
                </div>

                <div class="mb-6">
                    <label for="availability" class="block text-sm font-medium text-slate-700 mb-2">活動可能時間 *</label>
                    <div class="space-y-2">
                        <label class="flex items-center">
                            <input type="checkbox" name="availability" value="weekday-daytime" class="rounded border-slate-300 text-blue-600 focus:ring-blue-500">
                            <span class="ml-2 text-sm text-slate-700">平日昼間（9:00-18:00）</span>
                        </label>
                        <label class="flex items-center">
                            <input type="checkbox" name="availability" value="weekday-evening" class="rounded border-slate-300 text-blue-600 focus:ring-blue-500">
                            <span class="ml-2 text-sm text-slate-700">平日夜間（18:00-22:00）</span>
                        </label>
                        <label class="flex items-center">
                            <input type="checkbox" name="availability" value="weekend" class="rounded border-slate-300 text-blue-600 focus:ring-blue-500">
                            <span class="ml-2 text-sm text-slate-700">土日祝日</span>
                        </label>
                    </div>
                </div>

                <div class="mb-6">
                    <label for="fee" class="block text-sm font-medium text-slate-700 mb-2">希望報酬（1回50分あたり） *</label>
                    <select id="fee" name="fee" required
                            class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                        <option value="">選択してください</option>
                        <option value="3000-5000">3,000円 - 5,000円</option>
                        <option value="5000-7000">5,000円 - 7,000円</option>
                        <option value="7000-10000">7,000円 - 10,000円</option>
                        <option value="10000+">10,000円以上</option>
                    </select>
                </div>

                <div class="mb-6">
                    <label class="flex items-center">
                        <input type="checkbox" id="free-consultation" name="free-consultation" class="rounded border-slate-300 text-blue-600 focus:ring-blue-500">
                        <span class="ml-2 text-sm text-slate-700">初回無料相談を実施する</span>
                    </label>
                </div>
            </section>

            <!-- 自己PR -->
            <section class="bg-slate-50 p-6 rounded-lg">
                <h2 class="text-xl font-bold text-slate-800 mb-6">自己PR</h2>

                <div class="mb-6">
                    <label for="self-introduction" class="block text-sm font-medium text-slate-700 mb-2">自己紹介文 *</label>
                    <textarea id="self-introduction" name="self-introduction" rows="6" required
                              placeholder="クライアント様に自己紹介する文をご記入ください（200文字以上）"
                              class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"></textarea>
                    <p class="text-xs text-slate-500 mt-1">200文字以上で入力してください</p>
                </div>

                <div class="mb-6">
                    <label for="motivation" class="block text-sm font-medium text-slate-700 mb-2">伴走者になりたい理由 *</label>
                    <textarea id="motivation" name="motivation" rows="4" required
                              placeholder="なぜReliefの伴走者になりたいのかをご記入ください"
                              class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"></textarea>
                </div>
            </section>

            <!-- 同意事項 -->
            <section class="bg-slate-50 p-6 rounded-lg">
                <h2 class="text-xl font-bold text-slate-800 mb-6">同意事項</h2>

                <div class="space-y-4">
                    <div>
                        <label class="flex items-start">
                            <input type="checkbox" id="terms-agreement" name="terms-agreement" required class="mt-1 rounded border-slate-300 text-blue-600 focus:ring-blue-500">
                            <span class="ml-2 text-sm text-slate-700">
                                <a href="terms-mentor.html" class="text-blue-600 hover:text-blue-800 underline">伴走者利用規約</a>に同意します *
                            </span>
                        </label>
                    </div>

                    <div>
                        <label class="flex items-start">
                            <input type="checkbox" id="privacy-agreement" name="privacy-agreement" required class="mt-1 rounded border-slate-300 text-blue-600 focus:ring-blue-500">
                            <span class="ml-2 text-sm text-slate-700">
                                <a href="privacy.html" class="text-blue-600 hover:text-blue-800 underline">プライバシーポリシー</a>に同意します *
                            </span>
                        </label>
                    </div>

                    <div>
                        <label class="flex items-start">
                            <input type="checkbox" id="accuracy-confirmation" name="accuracy-confirmation" required class="mt-1 rounded border-slate-300 text-blue-600 focus:ring-blue-500">
                            <span class="ml-2 text-sm text-slate-700">
                                記載された情報は正確であり、虚偽の記載がないことを確認します *
                            </span>
                        </label>
                    </div>
                </div>
            </section>

            <!-- 送信ボタン -->
            <div class="text-center">
                <button type="submit" class="px-8 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors font-medium">
                    登録申請を送信する
                </button>
                <p class="text-sm text-slate-600 mt-4">
                    送信後、審査の結果について1週間以内にメールにてご連絡いたします。
                </p>
            </div>
        </form>
    </main>

    <div id="footer"></div>
    <script src="assets/script.js" defer></script>
    <script>
        // フォームバリデーション
        document.getElementById('mentor-register-form').addEventListener('submit', function(e) {
            e.preventDefault();

            // 自己紹介文の文字数チェック
            const selfIntro = document.getElementById('self-introduction').value;
            if (selfIntro.length < 200) {
                alert('自己紹介文は200文字以上で入力してください。');
                return;
            }

            // 得意分野のチェック
            const specialties = document.querySelectorAll('input[name="specialties"]:checked');
            if (specialties.length === 0) {
                alert('得意分野を1つ以上選択してください。');
                return;
            }

            // 相談方法のチェック
            const consultationMethods = document.querySelectorAll('input[name="consultation-method"]:checked');
            if (consultationMethods.length === 0) {
                alert('相談方法を1つ以上選択してください。');
                return;
            }

            // 活動可能時間のチェック
            const availabilities = document.querySelectorAll('input[name="availability"]:checked');
            if (availabilities.length === 0) {
                alert('活動可能時間を1つ以上選択してください。');
                return;
            }

            // 送信処理（実際の送信はここで行う）
            alert('登録申請を送信しました。審査結果をお待ちください。');
            // this.submit(); // 実際の送信時はコメントアウトを外す
        });
    </script>
</body>
</html>
